services:
  app:
    build: .
    container_name: bien-gioi-mem
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://biengioimem.juntran.id.vn}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DATABASE_PATH=/app/data/db.sqlite
      - USE_HTTPS=0
      - OCR_URL=http://ocr:8868/ocr
    depends_on:
      - ocr
    restart: unless-stopped

  ocr:
    build: ./ocr-service
    container_name: bien-gioi-mem-ocr
    expose:
      - "8868"
    ports:
      - "8868:8868" # exposed to host so the dev server (npm run dev) can reach it too
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: bien-gioi-mem-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
